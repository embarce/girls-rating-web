<!doctype html>
<html lang="en">
  <head>

    <meta name="bingbot" content="index, follow" />

    <!-- Primary Meta Tags -->
    <title>Girls Rating | Curated Cosplay Photography Gallery</title>
    <meta name="title" content="Girls Rating | Curated Cosplay Photography Gallery" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />

    <meta property="og:site_name" content="Girls Rating" />

    <!-- Twitter -->

    <meta name="theme-color" content="#050505" />
    <meta name="msapplication-TileColor" content="#FF2D55" />

    <!-- Favicon -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Girls Rating",
        "alternateName": "Girls Rating Cosplay Gallery",
        "url": "https://girls-rating.com",
        "description": "Curated gallery of high-quality cosplay photography with daily updates",
        "publisher": {
          "@type": "Organization",
          "name": "Girls Rating Group",
          "url": "https://girls-rating.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://girls-rating.com/images/logo.png"
          }
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://girls-rating.com/?search={search_term_string}",
          "query-input": "required name=search_term_string"
        },
        "inLanguage": ["en", "zh-CN"],
        "genre": "Cosplay Photography",
        "keywords": "cosplay, photography, gallery, anime, manga, game cosplay"
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ImageGallery",
        "name": "Girls Rating Cosplay Gallery",
        "description": "Daily updates of cosplay photos, best quality, collected from the global internet",
        "url": "https://girls-rating.com",
        "image": {
          "@type": "ImageObject",
          "url": "https://girls-rating.com/og-image.jpg",
          "width": 1200,
          "height": 630
        },
        "author": {
          "@type": "Organization",
          "name": "Girls Rating Group"
        },
        "genre": "Cosplay Photography",
        "accessMode": "visual",
        "accessibilityFeature": "alternative text for images",
        "contentRating": "18+",
        "inLanguage": ["en", "zh-CN"]
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Girls Rating Group",
        "url": "https://girls-rating.com",
        "logo": "https://girls-rating.com/images/logo.png",
        "description": "Curated cosplay photography gallery with daily updates",
        "foundingDate": "2024",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "support@girls-rating.com"
        },
        "sameAs": [
          "https://twitter.com/girlsrating",
          "https://www.instagram.com/girlsrating"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
